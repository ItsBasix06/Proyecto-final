{% extends "usuarios/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Iniciar sesión</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Entrar</button>
</form>

<p>
    ¿No tienes cuenta?
    <a href="{% url 'registro' %}">Regístrate</a>
</p>
<p>
    <a href="{% url 'index' %}">Volver al inicio</a>
</p>
{% endblock %}
