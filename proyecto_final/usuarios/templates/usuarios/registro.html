{% extends "usuarios/base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<h1>Registro de Cliente</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Registrarse</button>
</form>

<p>
    ¿Ya tienes cuenta?
    <a href="{% url 'login' %}">Inicia sesión</a>
</p>
<p>
    <a href="{% url 'index' %}">Volver al inicio</a>
</p>
{% endblock %}
