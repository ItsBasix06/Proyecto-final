{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}ArquiData{% endblock %}</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/tooplate.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">

    <link rel="shortcut icon" href="{% static 'img/logo-favicon.ico' %}" type="image/x-icon">
</head>

<body id="reportsPage">
    <div id="loader-wrapper">
        <svg viewBox="25 25 50 50" class="loader-svg">
            <circle r="20" cy="50" cx="50"></circle>
        </svg>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <nav class="navbar navbar-expand-xl navbar-dark py-3"
                    style="background-color: #003366; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,51,102,0.1);">

                    <a class="navbar-brand ml-3" href="#">
                        <img src="{% static 'img/logo-titulo.png' %}" alt="Logo ArquiData" class="logo-header">
                        <span class="badge badge-light text-primary ml-2 shadow-sm"
                            style="font-size: 0.7em; vertical-align: middle;">CLIENTE</span>
                    </a>

                    <button class="navbar-toggler ml-auto mr-0" type="button" data-toggle="collapse"
                        data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav mx-auto ml-5">
                            <li class="nav-item active px-2"> 
                                <a class="nav-link" href="#">
                                    <i class="fas fa-tachometer-alt mr-2"></i>Inicio
                                </a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" href="#">
                                    <i class="fas fa-folder-open mr-2"></i>Proyectos
                                </a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" href="#">
                                    <i class="fas fa-users mr-2"></i>Planos
                                </a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" href="#">
                                    <i class="fas fa-layer-group mr-2"></i>Arquitectos
                                </a>
                            </li>
                        </ul>

                        <ul class="navbar-nav align-items-center">
                            <li class="nav-item custom-btn-item mr-3">
                                <a href="{% url 'logout' %}" class="nav-link custom-btn-link">
                                    <div class="user-profile logout-style">
                                        <div class="user-profile-inner">
                                            <i class="fas fa-sign-out-alt"></i>
                                            <p>Salir</p>
                                        </div>
                                    </div>
                                </a>
                            </li>

                            <li class="nav-item d-flex align-items-center mr-3">
                                <label class="switch">
                                    <span class="sun"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <g fill="#ffd43b">
                                                <circle r="5" cy="12" cx="12"></circle>
                                                <path
                                                    d="m21 13h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm-17 0h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm13.66-5.66a1 1 0 0 1 -.66-.29 1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.71.71a1 1 0 0 1 -.75.29zm-12.02 12.02a1 1 0 0 1 -.71-.29 1 1 0 0 1 0-1.41l.71-.66a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 0 1 -.7.24zm6.36-14.36a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm0 17a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm-5.66-14.66a1 1 0 0 1 -.7-.29l-.71-.71a1 1 0 0 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.29zm12.02 12.02a1 1 0 0 1 -.7-.29l-.66-.71a1 1 0 0 1 1.36-1.36l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.24z">
                                                </path>
                                            </g>
                                        </svg></span>
                                    <span class="moon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                                            <path
                                                d="m223.5 32c-123.5 0-223.5 100.3-223.5 224s100 224 223.5 224c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.8-175.5-176 0-65.8 36-123.1 89.3-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z">
                                            </path>
                                        </svg></span>
                                    <input type="checkbox" class="input" id="theme-toggle">
                                    <span class="slider"></span>
                                </label>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </div>

        {% block content %}{% endblock %}

        <footer id="footer" class="footer position-relative mt-5">
            <div class="footer-top-border"></div>
            <div class="container text-center py-4">
                <p>© 2026 <strong>ArquiData</strong>. Transformando la gestión arquitectónica.</p>
            </div>
        </footer>
    </div>

    <script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>

    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 800);
        });

        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        themeToggle.addEventListener('change', function () {
            if (this.checked) {
                body.classList.add('dark-mode');
            } else {
                body.classList.remove('dark-mode');
            }
        });
    </script>
</body>

</html>
